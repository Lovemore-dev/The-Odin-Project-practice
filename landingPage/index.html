<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page</title>
  </head>
  <body>
    <!-- header section -->
    <header class="header">
      <!-- navbar -->
      <nav class="nav">
        <!-- logo -->
        <div class="logo">
            <!-- hero logo text -->
            <p>Header Logo</p>
        </div>
        <!-- navbar links -->
        <div class="navbar">
          <ul>
            <li><a href="#">header link one</a></li>
            <li><a href="#">header link two</a></li>
            <li><a href="#">header link three</a></li>
          </ul>
        </div>
      </nav>
    </header>
    <!-- hero section -->
    <section class="hero">
      <!-- text -->
      <div class="heroText">
        <!-- hero main text -->
        <p>This website is awesome</p>
        <!-- hero secondary text -->
        <p>
          This website has some subtext that goes here under the main title.
          It's a smaller font and the color is lower contrast
        </p>
        <!-- sign up button -->
        <button type="button">Sign up</button>
      </div>
      <!-- hero image -->
      <div class="heroImage">Image goes here</div>
    </section>
    <!-- information section -->
    <section class="infoSec">
        <!-- information heading -->
         <p>Some random information</p>
         <!-- cards -->
          
    </section>
  </body>
</html>
